<div class="signup-page">

  <!-- HEADER -->
  <nav class="navbar">
    <div class="logo">
      SupplySync
    </div>

    <div class="nav-links">
      <a routerLink="/about">About</a>
      <a routerLink="/contact">Contact</a>
      <a routerLink="/">Login</a>

      <a
        routerLink="/signup"
        class="signup-btn"
      >
        Signup
      </a>
    </div>
  </nav>

  <!-- SIGNUP CARD -->
  <div class="signup-card">

    <h1>Join the Network</h1>

    <p class="subtitle">
      Access authoritative inventory and supply chain controls.
    </p>

    <div class="form-grid">

      <div class="input-group">
        <label>Full Name</label>
        <input
          type="text"
          placeholder="John Doe"
        />
      </div>

      <div class="input-group">
        <label>Email Address</label>
        <input
          type="email"
          placeholder="john.doe@company.com"
        />
      </div>

      <div class="input-group">
        <label>Phone Number</label>
        <input
          type="text"
          placeholder="+1 (555) 000-0000"
        />
      </div>

      <div class="input-group">
        <label>Employee ID</label>
        <input
          type="text"
          placeholder="EMP-4509-X"
        />
      </div>

    </div>

    <div class="input-group full-width">
      <label>Assigned Role</label>

      <select>
        <option>Select your organizational role</option>
        <option>Store Manager</option>
        <option>Warehouse Staff</option>
        <option>Finance Admin</option>
        <option>Supplier</option>
        
      </select>
    </div>

    <div class="form-grid">

      <div class="input-group">
        <label>Password</label>
        <input
          type="password"
          placeholder="********"
        />
      </div>

      <div class="input-group">
        <label>Confirm Password</label>
        <input
          type="password"
          placeholder="********"
        />
      </div>

    </div>

    <button class="signup-button">
      Create Account →
    </button>

    <p class="bottom-text">
      Already have an account?
      <a routerLink="/">
        Log in here
      </a>
    </p>

  </div>

  <!-- FOOTER -->
  <footer class="footer">

    <div class="footer-logo">
      SupplySync
    </div>

    <div class="footer-links">
      <a>Privacy Policy</a>
      <a>Terms</a>
      <a>Contact Support</a>
    </div>

    <div class="copyright">
      © 2024 SupplySync. All rights reserved.
    </div>

  </footer>

</div>
